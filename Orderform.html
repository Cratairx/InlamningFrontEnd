<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>Formulär</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS  -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="header"></div>
    <div class="container">
      <form novalidate>
        <!-- Namn -->
        <div class="mb-3">
          <label class="form-label">Namn</label>
          <input
            id="name"
            type="text"
            class="form-control"
            placeholder="Jane Doe"
            required
          />
        </div>

        <!-- E-post -->
        <div class="mb-3">
          <label class="form-label">E-post</label>
          <input
            id="email"
            type="email"
            class="form-control"
            placeholder="email@exemple.se"
            required
          />
        </div>

        <!-- Telefonnummer -->
        <div class="mb-3">
          <label class="form-label">Telefonnummer</label>
          <input
            id="phone"
            type="tel"
            class="form-control"
            required
            placeholder="01234567"
          />
        </div>

        <!-- Gatuadress -->
        <div class="mb-3">
          <label class="form-label">Gatuadress</label>
          <input
            id="adress"
            type="text"
            class="form-control"
            required
            placeholder="hittahemgatan 2"
          />
        </div>

        <!-- Postnummer -->
        <div class="mb-3">
          <label class="form-label">Postnummer</label>
          <input
            id="zipcode"
            type="text"
            class="form-control"
            required
            placeholder="12345"
          />
        </div>

        <!-- stad -->
        <div class="mb-3">
          <label class="form-label">Stad</label>
          <input
            id="city"
            type="text"
            class="form-control"
            required
            placeholder="Stockholm"
          />
        </div>

        <button type="submit" class="btn btn-warning">Skicka</button>
      </form>
    </div>
    <div id="footer"></div>
    <!-- Glöm inte kopiera dess scrips in i varje fil -->
    <script src="BackupAPILoader.js"></script>
    <script
      src="https://kit.fontawesome.com/55ed10ce42.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
