<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>Formulär</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>
    <div class="container">
      <form novalidate>
        <!-- Namn -->
        <div class="mb-3">
          <label class="form-label">Namn</label>
          <input
            id="name"
            type="text"
            class="form-control"
            required
            minlength="2"
            maxlength="50"
          />
          <div class="invalid-feedback">Namn måste vara mellan 2-50 tecken</div>
        </div>

        <!-- E-post -->
        <div class="mb-3">
          <label class="form-label">E-post</label>
          <input
            id="email"
            type="email"
            class="form-control"
            required
            maxlength="50"
          />
          <div class="invalid-feedback">
            Ange en giltig epost (max 50 tecken)
          </div>
        </div>

        <!-- Telefon  rör ej pattern Sjukt jobbig att få rätt! pattern="[0-9+\- ]{1,20}" -->
        <div class="mb-3">
          <label class="form-label">Telefonnummer</label>
          <input
            id="phone"
            type="tel"
            class="form-control"
            required
            maxlength="20"
          />
          <div class="invalid-feedback">
            Endast siffror, (), - (max 20 tecken)
          </div>
        </div>

        <!-- Gatuadress -->
        <div class="mb-3">
          <label class="form-label">Gatuadress</label>
          <input
            id="adress"
            type="text"
            class="form-control"
            required
            minlength="2"
            maxlength="50"
          />
          <div class="invalid-feedback">2-50 tecken kävs</div>
        </div>

        <!-- Postnummer -->
        <div class="mb-3">
          <label class="form-label">Postnummer</label>
          <input
            id="zipcode"
            type="text"
            class="form-control"
            required
            pattern="[0-9]{5}"
          />
          <div class="invalid-feedback">Postnummer måste vara 5 siffror</div>
        </div>

        <!-- Ort -->
        <div class="mb-3">
          <label class="form-label">Orrt</label>
          <input
            id="city"
            type="text"
            class="form-control"
            required
            minlength="2"
            maxlength="20"
          />
          <div class="invalid-feedback">2-20 tecken krävs</div>
        </div>

        <button type="submit" class="btn btn-primary">Skicka</button>
      </form>
    </div>
    <div id="footer"></div>
    <!-- Glöm inte kopiera dess scrips in i varje fil -->
    <script src="loader.js"></script>
    <script
      src="https://kit.fontawesome.com/55ed10ce42.js"
      crossorigin="anonymous"
    ></script>

  </body>
</html>
